<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سوالات متداق</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>سوالات متداق</h1>
        </header>
        <main>
            <div class="form-card">
                <div class="faq-item">
                    <strong>چگونه می‌توانم ثبت نام کنم؟</strong>
                    <p>از صفحه اصلی روی گزینه «پیش ثبت نام مدارس» کلیک کنید.</p>
                </div>
                <div class="faq-item">
                    <strong>هزینه ثبت نام چقدر است؟</strong>
                    <p>هزینه ثبت نام ۵۰,۰۰۰ تومان می‌باشد.</p>
                </div>
                <div class="faq-item">
                    <strong>زمان تحویل چه زمانی است؟</strong>
                    <p>پس از ثبت نام، اطلاعات کامل در ۲۲ روز کاری ارسال می‌شود.</p>
                </div>
            </div>
        </main>
    </div>
    <a href="#" class="support-icon" title="پشتیبانی" id="supportBtn">
        <i class="fas fa-headset"></i>
    </a>
    <div class="modal" id="supportModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>پشتیبانی</h2>
            <div class="support-options">
                <a href="faq.html" class="support-option">
                    <i class="fas fa-question-circle"></i>
                    سوالات متداق
                </a>
                <a href="chat.html" class="support-option">
                    <i class="fas fa-comments"></i>
                    چت با پشتیبانی
                </a>
            </div>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
