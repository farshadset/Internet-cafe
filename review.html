<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بررسی اطلاعات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>بررسی اطلاعات</h1>
        </header>
        <main>
            <div class="form-card" id="reviewData">
                <h2>اطلاعات وارد شده</h2>
                <div class="info-item"><strong>شماره تلفن:</strong> <span id="displayPhone"></span></div>
                <div class="info-item"><strong>کد ملی والدین:</strong> <span id="displayParentNationalId"></span></div>
                <div class="info-item"><strong>تاریخ تولد والدین:</strong> <span id="displayBirthDate"></span></div>
                <div class="info-item"><strong>کد پستی:</strong> <span id="displayPostalCode"></span></div>
                <div class="info-item"><strong>کد ملی دانش‌آموز:</strong> <span id="displayStudentNationalId"></span></div>
                <div class="info-item"><strong>توضیحات:</strong> <span id="displayNotes"></span></div>
            </div>
            <button class="btn-confirm" id="confirmPaymentBtn">تایید و پرداخت</button>
        </main>
    </div>
    <a href="#" class="support-icon" title="پشتیبانی" id="supportBtn">
        <i class="fas fa-headset"></i>
    </a>
    <div class="modal" id="supportModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>پشتیبانی</h2>
            <div class="support-options">
                <a href="faq.html" class="support-option" id="faqOption">
                    <i class="fas fa-question-circle"></i>
                    سوالات متداق
                </a>
                <a href="chat.html" class="support-option" id="chatOption">
                    <i class="fas fa-comments"></i>
                    چت با پشتیبانی
                </a>
            </div>
        </div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
