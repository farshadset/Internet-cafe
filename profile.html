<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل کاربر</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>پروفایل کاربر</h1>
        </header>
        <main>
            <div class="form-card">
                <h2>سفارش‌ها</h2>
                <div class="order-icons">
                    <div class="order-item">
                        <a href="orders-pending.html" class="order-icon">
                            <i class="fas fa-hourglass-half"></i>
                        </a>
                        <small>در صف انتظار</small>
                    </div>
                    <div class="order-item">
                        <a href="orders-processing.html" class="order-icon">
                            <i class="fas fa-spinner"></i>
                        </a>
                        <small>در حال انجام</small>
                    </div>
                    <div class="order-item">
                        <a href="orders-completed.html" class="order-icon">
                            <i class="fas fa-check-circle"></i>
                        </a>
                        <small>انجام شده</small>
                    </div>
                </div>
                <a href="account.html" class="profile-option">
                    <i class="fas fa-user"></i>
                    حساب کاربری
                </a>
                <a href="change-password.html" class="profile-option">
                    <i class="fas fa-key"></i>
                    تغییر رمز عبور
                </a>
                <a href="#" class="profile-option" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    خروج
                </a>
                <a href="index.html" class="btn-next">بازگشت به صفحه اصلی</a>
            </div>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
