<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام کنکور سراسری</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ثبت‌نام کنکور سراسری</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="konkor">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small><span class="warning-text">حتماً به نام داوطلب باشد.</span> <span class="success-text">رمز ورود به این شماره پیامک می‌شود.</span></small>
                </div>

                <div class="form-group">
                    <label for="applicantNationalId">کد ملی داوطلب</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                    <small>۱۰ رقم، بدون فاصله</small>
                </div>

                <div class="form-group">
                    <label>تاریخ تولد</label>
                    <div class="date-fields">
                        <input type="number" id="birthYear" name="birthYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="birthMonth" name="birthMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="birthDay" name="birthDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>دقیقاً مطابق با شناسنامه</small>
                </div>

                <div class="form-group">
                    <label for="regionCode">کد منطقه محل سکونت</label>
                    <input type="text" id="regionCode" name="regionCode" placeholder="مثلاً ۱۷" maxlength="3" required>
                    <small>از روی کارت ملی یا جدول مناطق سازمان سنجش پیدا کنید.</small>
                </div>

                <div class="form-group">
                    <label for="educationLevel">مدرک تحصیلی</label>
                    <select id="educationLevel" name="educationLevel" required>
                        <option value="">انتخاب کنید</option>
                        <option value="diploma">دیپلم</option>
                        <option value="associate">فوق دیپلم</option>
                        <option value="bachelor">لیسانس</option>
                        <option value="master">کارشناسی ارشد</option>
                        <option value="phd">دکتری</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <textarea id="additionalNotes" name="additionalNotes" rows="3" placeholder="مثل: سهمیه ایثارگری، بهزیستی و..."></textarea>
                </div>

                <button type="submit" class="btn-next">مرحله بعد</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
