<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سفارش‌های در صف انتظار</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>سفارش‌های در صف انتظار</h1>
        </header>
        <main>
            <div class="form-card" id="pendingOrders">
                <p>بارگذاری...</p>
            </div>
            <a href="profile.html" class="btn-next">بازگشت</a>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var container = document.getElementById('pendingOrders');
            var userData = JSON.parse(localStorage.getItem('userData') || 'null');
            var username = userData ? userData.username : null;
            fetch('/api/orders/user?username=' + encodeURIComponent(username) + '&status=pending')
                .then(function(r) { return r.json(); })
                .then(function(orders) {
                    container.innerHTML = '';
                    if (orders.length === 0) {
                        container.innerHTML = '<p style="text-align:center;color:#999;">سفارشی یافت نشد.</p>';
                        return;
                    }
                    orders.forEach(function(order) {
                        var div = document.createElement('div');
                        div.className = 'order-card';
                        var dateStr = new Date(order.id).toLocaleDateString('fa-IR');
                        div.innerHTML = '<div class="order-title">' + (order.username || 'کاربر') + '</div>' +
                            '<div style="text-align:center;margin-bottom:0.25rem;">' +
                            '<strong>کد سفارش: ' + order.trackingCode + '</strong>' +
                            '<small style="color:#666;margin-right:0.75rem;">' + dateStr + '</small>' +
                            '</div>' +
                            '<div class="order-actions" style="text-align:center;">' +
                            '<a href="order-detail.html?code=' + order.trackingCode + '" class="btn-view-detail">' +
                            '<i class="fas fa-eye"></i> مشاهده جزئیات</a></div>';
                        container.appendChild(div);
                    });
                })
                .catch(function() {
                    container.innerHTML = '<p style="text-align:center;color:red;">خطا در بارگذاری سفارشات.</p>';
                });
        });
    </script>
</body>
</html>
