<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدور گواهی عدم سوء پیشینه (اینترنتی)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>صدور گواهی عدم سوء پیشینه (اینترنتی)</h1>
        </header>
        <main>
            <form id="serviceForm" class="form-card" data-service="criminal-record">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small>حتماً به نام خود متقاضی باشد. رمز پیامک می‌شود.</small>
                </div>

                <div class="form-group">
                    <label for="applicantNationalId">کد ملی متقاضی</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                    <small>۱۰ رقم</small>
                </div>

                <div class="form-group">
                    <label>تاریخ تولد</label>
                    <div class="date-fields">
                        <input type="number" id="birthYear" name="birthYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="birthMonth" name="birthMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="birthDay" name="birthDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>دقیقاً مطابق با شناسنامه</small>
                </div>

                <div class="form-group">
                    <label for="idNumber">شماره شناسنامه</label>
                    <input type="text" id="idNumber" name="idNumber" required>
                    <small>سری و شماره شناسنامه</small>
                </div>

                <div class="form-group">
                    <label for="birthplace">محل صدور شناسنامه</label>
                    <input type="text" id="birthplace" name="birthplace" required>
                    <small>شهر محل صدور</small>
                </div>

                <div class="form-group">
                    <label>نحوه دریافت</label>
                    <div class="checkbox-group">
                        <label><input type="radio" name="deliveryMethod" value="postal" required> ارسال به آدرس پستی</label>
                        <label><input type="radio" name="deliveryMethod" value="inperson"> تحویل حضوری در دفاتر پیشخوان</label>
                    </div>
                    <small>روش دریافت را انتخاب کنید.</small>
                </div>

                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <textarea id="additionalNotes" name="additionalNotes" rows="3" placeholder="در صورت نیاز به ترجمه رسمی، قید کنید."></textarea>
                </div>

                <button type="submit" class="btn-next">مرحبه بعد</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
