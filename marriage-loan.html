<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام وام ازدواج</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ثبت‌نام وام ازدواج</h1>
        </header>
        <main>
            <form id="marriageLoanForm" class="form-card">
                <div class="form-group">
                    <label for="applicantPhone">شماره تلفن همراه</label>
                    <input type="tel" id="applicantPhone" name="applicantPhone" placeholder="09xx-xxx-xxxx" required>
                    <small><span class="warning-text">حتماً به نام خود شخص باشد.</span> <span class="success-text">تمام مراحل از طریق پیامک پیگیری می‌شود.</span></small>
                </div>

                <div class="form-group">
                    <label for="applicantNationalId">کد ملی (خود شخص)</label>
                    <input type="text" id="applicantNationalId" name="applicantNationalId" maxlength="10" required>
                    <small>متقاضی باید بالای ۱۸ سال باشد.</small>
                </div>

                <div class="form-group">
                    <label>تاریخ تولد</label>
                    <div class="date-fields">
                        <input type="number" id="birthYear" name="birthYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="birthMonth" name="birthMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="birthDay" name="birthDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>دقیقاً مطابق با شناسنامه</small>
                </div>

                <div class="form-group">
                    <label>تاریخ عقد</label>
                    <div class="date-fields">
                        <input type="number" id="marriageYear" name="marriageYear" placeholder="سال" min="1300" max="1500" required>
                        <input type="number" id="marriageMonth" name="marriageMonth" placeholder="ماه" min="1" max="12" required>
                        <input type="number" id="marriageDay" name="marriageDay" placeholder="روز" min="1" max="31" required>
                    </div>
                    <small>مندرج در سند ازدواج</small>
                </div>

                <div class="form-group">
                    <label for="idNumber">شماره شناسنامه</label>
                    <input type="text" id="idNumber" name="idNumber" required>
                    <small>سری و شماره شناسنامه خود را وارد کنید.</small>
                </div>

                <div class="form-group">
                    <label for="additionalNotes">توضیحات اضافی</label>
                    <textarea id="additionalNotes" name="additionalNotes" rows="3" placeholder="توضیحات خود را اینجا بنویسید..."></textarea>
                </div>

                <button type="submit" class="btn-next">مرحله بعد</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('marriageLoanForm');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    const data = Object.fromEntries(new FormData(form));
                    localStorage.setItem('registrationData', JSON.stringify(data));
                    window.location.href = 'review.html';
                });
            }
        });
    </script>
</body>
</html>
