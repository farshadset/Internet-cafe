<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب کاربری</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>حساب کاربری</h1>
        </header>
        <main>
            <div class="form-card">
                <div class="profile-field">
                    <label>نام کاربری</label>
                    <div class="field-value">
                        <span id="displayUsername"></span>
                        <a href="#" class="edit-btn" id="editUsername"><i class="fas fa-edit"></i></a>
                    </div>
                </div>
                <div class="profile-field">
                    <label>شماره همراه</label>
                    <div class="field-value">
                        <span id="displayPhone"></span>
                        <a href="#" class="edit-btn" id="editPhone"><i class="fas fa-edit"></i></a>
                    </div>
                </div>
                <a href="profile.html" class="btn-next">بازگشت</a>
            </div>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
