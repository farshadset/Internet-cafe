<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت با مشتری</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>چت با مشتری</h1>
        </header>
        <main>
            <div class="chat-container">
                <div class="chat-messages" id="adminChatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="adminMessageInput" placeholder="پاسخ خود را اینجا بنویسید...">
                    <button id="adminSendBtn">ارسال</button>
                </div>
            </div>
            <a href="admin.html" class="btn-next">بازگشت</a>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var chatMessages = document.getElementById('adminChatMessages');
            var adminMessageInput = document.getElementById('adminMessageInput');
            var adminSendBtn = document.getElementById('adminSendBtn');
            
            var lastTimestamp = null;
            var pollingInterval = null;
            
            function loadMessages() {
                fetch('/api/admin/chat')
                    .then(function(r) { return r.json(); })
                    .then(function(messages) {
                        var hadMessages = messages.length > 0;
                        chatMessages.innerHTML = '';
                        
                        if (!hadMessages) {
                            var welcomeDiv = document.createElement('div');
                            welcomeDiv.className = 'message support';
                            welcomeDiv.textContent = 'مشتری: سوالی دارید؟';
                            chatMessages.appendChild(welcomeDiv);
                        } else {
                            messages.forEach(function(msg) {
                                var div = document.createElement('div');
                                div.className = 'message ' + (msg.role === 'admin' ? 'user' : 'support');
                                if (msg.role === 'admin') {
                                    div.textContent = 'شما: ' + msg.text;
                                    div.setAttribute('data-role', 'admin');
                                } else {
                                    div.setAttribute('data-role', 'customer');
                                    var usernameSpan = document.createElement('span');
                                    usernameSpan.className = 'customer-username';
                                    usernameSpan.textContent = msg.username + ': ';
                                    div.appendChild(usernameSpan);
                                    var textNode = document.createTextNode(msg.text);
                                    div.appendChild(textNode);
                                }
                                chatMessages.appendChild(div);
                                if (msg.timestamp && (!lastTimestamp || msg.timestamp > lastTimestamp)) {
                                    lastTimestamp = msg.timestamp;
                                }
                            });
                        }
                        if (chatMessages.scrollHeight > chatMessages.parentElement.clientHeight) {
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }
                    })
                    .catch(function() {});
            }
            
            adminSendBtn.addEventListener('click', function() {
                var text = adminMessageInput.value.trim();
                if (text) {
                    fetch('/api/admin/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text })
                    })
                    .then(function(r) { return r.json(); })
                    .then(function(msg) {
                        var div = document.createElement('div');
                        div.className = 'message user';
                        div.textContent = 'شما: ' + msg.text;
                        div.setAttribute('data-role', 'admin');
                        chatMessages.appendChild(div);
                        adminMessageInput.value = '';
                        lastTimestamp = msg.timestamp;
                    })
                    .catch(function() {});
                }
            });
            
            loadMessages();
            pollingInterval = setInterval(loadMessages, 2000);
            
            window.addEventListener('beforeunload', function() {
                if (pollingInterval) clearInterval(pollingInterval);
            });
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
