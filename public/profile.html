<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروفایل کاربر</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>پروفایل کاربر</h1>
        </header>
        <main>
            <div class="form-card">
                <h2>سفارش‌ها</h2>
                <div class="order-icons">
                    <div class="order-item">
                        <a href="orders-pending.html" class="order-icon">
                            <span class="order-count" id="countPending">0</span>
                            <i class="fas fa-hourglass-half"></i>
                        </a>
                        <small>در صف انتظار</small>
                    </div>
                    <div class="order-item">
                        <a href="orders-processing.html" class="order-icon">
                            <span class="order-count" id="countProcessing">0</span>
                            <i class="fas fa-spinner"></i>
                        </a>
                        <small>در حال انجام</small>
                    </div>
                    <div class="order-item">
                        <a href="orders-completed.html" class="order-icon">
                            <span class="order-count" id="countCompleted">0</span>
                            <i class="fas fa-check-circle"></i>
                        </a>
                        <small>انجام شده</small>
                    </div>
                </div>
                <a href="account.html" class="profile-option">
                    <i class="fas fa-user"></i>
                    حساب کاربری
                </a>
                <a href="change-password.html" class="profile-option">
                    <i class="fas fa-key"></i>
                    تغییر رمز عبور
                </a>
                <a href="#" class="profile-option" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    خروج
                </a>
                <a href="index.html" class="btn-next">بازگشت به صفحه اصلی</a>
            </div>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var userData = JSON.parse(localStorage.getItem('userData') || 'null');
            var username = userData ? userData.username : null;

            function updateCounts() {
                fetch('/api/orders/user?username=' + encodeURIComponent(username))
                    .then(function(r) { return r.json(); })
                    .then(function(orders) {
                        var counts = { pending: 0, processing: 0, completed: 0 };
                        orders.forEach(function(o) {
                            if (o.status === 'pending') counts.pending++;
                            else if (o.status === 'processing') counts.processing++;
                            else if (o.status === 'completed') counts.completed++;
                        });
                        var elPending = document.getElementById('countPending');
                        var elProcessing = document.getElementById('countProcessing');
                        var elCompleted = document.getElementById('countCompleted');
                        if (elPending) elPending.textContent = counts.pending;
                        if (elProcessing) elProcessing.textContent = counts.processing;
                        if (elCompleted) elCompleted.textContent = counts.completed;
                    })
                    .catch(function() {});
            }

            updateCounts();
            setInterval(updateCounts, 3000);
        });
    </script>
</body>
</html>
