<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پرداخت موفق</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>پرداخت موفق</h1>
        </header>
        <main>
            <div class="form-card">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>پرداخت با موفقیت انجام شد!</h2>
                <p class="tracking-code">کد سفارش: <strong id="trackingCode"></strong></p>
                <a href="orders-pending.html" class="btn-next">پیگیری سفارش</a>
                <a href="index.html" class="btn-next" style="background:#999;margin-top:0.5rem;">بازگشت به صفحه اصلی</a>
            </div>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var tc = localStorage.getItem('lastTrackingCode');
            if (tc && document.getElementById('trackingCode')) {
                document.getElementById('trackingCode').textContent = tc;
            }
        });
    </script>
</body>
</html>
