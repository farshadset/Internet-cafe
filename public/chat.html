<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چت با پشتیبانی</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>چت با پشتیبانی</h1>
        </header>
        <main>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message support">پشتیبانی: سلام! چطور می‌توانم کمکتان کنم؟</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="پیام خود را اینجا بنویسید...">
                    <button id="sendBtn">ارسال</button>
                </div>
            </div>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
