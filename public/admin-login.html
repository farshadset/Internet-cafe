<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود مدیر</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo-icon" title="صفحه اصلی">
            <i class="fas fa-mug-hot"></i>
        </a>
        <header>
            <h1>ورود مدیر</h1>
        </header>
        <main>
            <form id="adminLoginForm" class="form-card">
                <div class="form-group">
                    <label for="adminUsername">نام کاربری</label>
                    <input type="text" id="adminUsername" name="adminUsername" placeholder="نام کاربری" required>
                </div>
                <div class="form-group">
                    <label for="adminPassword">رمز عبور</label>
                    <div class="password-field">
                        <input type="password" id="adminPassword" name="adminPassword" placeholder="رمز عبور" required>
                        <span class="toggle-password" id="toggleAdminPassword">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn-next">ورود</button>
            </form>
        </main>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="app.js"></script>
</body>
</html>
